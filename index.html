<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>⛧ El Umbral ⛧</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;overflow:hidden;background:#02020a;font-family:'Georgia','Times New Roman',serif}
  #gate{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10;padding:24px;text-align:center}
  canvas#bg{position:fixed;inset:0;z-index:0;display:block}
  .veil{position:fixed;inset:0;z-index:1;background:radial-gradient(ellipse at center, rgba(10,2,18,.2) 0%, rgba(2,2,10,.85) 70%, #02020a 100%);pointer-events:none}
  .vignette{position:fixed;inset:0;z-index:2;box-shadow:inset 0 0 280px 80px #000;pointer-events:none}
  .gate-inner{position:relative;z-index:12;max-width:620px;animation:rise 2.2s ease both}
  @keyframes rise{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:none}}
  .sigil{font-size:46px;color:#7a1020;text-shadow:0 0 26px #b3142e,0 0 60px #5c0a17;margin-bottom:10px;animation:pulse 4s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:.55;transform:scale(1)}50%{opacity:1;transform:scale(1.08)}}
  .welcome{font-size:13px;letter-spacing:5px;text-transform:uppercase;color:#6b2230;margin-bottom:18px}
  h1{font-size:clamp(26px,5vw,44px);font-weight:700;letter-spacing:1px;line-height:1.2;
     background:linear-gradient(180deg,#d9c2a0 0%,#9a7b5a 45%,#5c1320 100%);-webkit-background-clip:text;background-clip:text;color:transparent;
     text-shadow:0 2px 30px rgba(140,20,40,.3);margin-bottom:22px}
  .omen{font-style:italic;font-size:clamp(14px,2.4vw,17px);line-height:1.8;color:#9a8a78;max-width:520px;margin:0 auto 30px;
        text-shadow:0 0 14px rgba(0,0,0,.9)}
  .omen .dark{color:#b3142e;font-weight:600;text-shadow:0 0 18px rgba(179,20,46,.6)}
  .field{position:relative;width:min(360px,84vw);margin:0 auto}
  #pw{width:100%;background:rgba(8,4,12,.7);border:1px solid #3a1420;border-radius:10px;padding:15px 18px;color:#e8d9c0;
      font-family:'Courier New',monospace;font-size:16px;letter-spacing:3px;text-align:center;outline:none;transition:.3s;backdrop-filter:blur(4px)}
  #pw::placeholder{color:#5a3a44;letter-spacing:2px}
  #pw:focus{border-color:#b3142e;box-shadow:0 0 28px rgba(179,20,46,.4)}
  #pw.shake{animation:shake .5s}
  @keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-10px)}40%{transform:translateX(10px)}60%{transform:translateX(-7px)}80%{transform:translateX(7px)}}
  .enter{margin-top:16px;width:min(360px,84vw);background:linear-gradient(135deg,#5c0a17,#b3142e);border:none;border-radius:10px;
         padding:14px;color:#f0e0d0;font-family:'Georgia',serif;font-size:15px;letter-spacing:2px;cursor:pointer;transition:.25s;
         text-transform:uppercase;box-shadow:0 0 24px rgba(179,20,46,.3)}
  .enter:hover{transform:translateY(-2px);box-shadow:0 6px 36px rgba(179,20,46,.55)}
  .enter:active{transform:translateY(0)}
  .msg{min-height:26px;margin-top:18px;font-size:14px;font-style:italic;color:#b3142e;letter-spacing:1px;
       text-shadow:0 0 16px rgba(179,20,46,.5);transition:.3s;opacity:0}
  .msg.show{opacity:1}
  .warn-foot{position:fixed;bottom:16px;left:0;right:0;z-index:12;text-align:center;font-size:11px;letter-spacing:2px;
             color:#3a2630;text-transform:uppercase}
  .loading{color:#9a8a78;font-style:italic;letter-spacing:2px}
</style>
</head>

<canvas id="bg"></canvas>
<div class="veil"></div>

<div id="gate">
  <div class="gate-inner">
    <div class="sigil">⛧</div>
    <div class="welcome">Te invita el</div>
    <h1>Señor del Dominó<br>Grandmaster Guillermo</h1>
    <p class="omen">Siempre ten temor a lo desconocido.<br>Si miras la <span class="dark">oscuridad</span> mucho tiempo,<br>la <span class="dark">oscuridad</span> puede voltear a verte.</p>
    <div class="field">
      <input id="pw" type="password" placeholder="• • • • • • • • • •" autocomplete="off" spellcheck="false">
    </div>
    <button class="enter" id="enterBtn">Cruzar el umbral</button>
    <div class="msg" id="msg"></div>
  </div>
</div>
<div class="warn-foot">⚠ Tu dispositivo puede ser hackeado si cruzas sin el permiso y la palabra de poder ⚠</div>

// ===== fondo tenebroso 3D (partículas/niebla + ojos que observan) =====
(function(){
  const c=document.getElementById('bg'), x=c.getContext('2d');
  let W,H; function size(){W=c.width=innerWidth;H=c.height=innerHeight;} size(); addEventListener('resize',size);
  // niebla de partículas con profundidad (pseudo-3D)
  const N=120, ps=[];
  for(let i=0;i<N;i++) ps.push({x:Math.random()*W,y:Math.random()*H,z:Math.random()*1+0.2,r:Math.random()*2+0.5,vy:-(Math.random()*0.3+0.05)});
  // "ojos" que aparecen y desaparecen en la oscuridad
  const eyes=[]; 
  function spawnEye(){ eyes.push({x:Math.random()*W,y:Math.random()*H*0.8+H*0.1,life:0,max:180+Math.random()*120,size:6+Math.random()*10}); }
  let t=0;
  function draw(){
    x.fillStyle='#02020a'; x.fillRect(0,0,W,H);
    // resplandor rojo inferior (portal)
    const g=x.createRadialGradient(W/2,H*1.15,0,W/2,H*1.15,H*0.9);
    g.addColorStop(0,'rgba(120,12,28,0.5)'); g.addColorStop(0.5,'rgba(50,6,16,0.18)'); g.addColorStop(1,'rgba(2,2,10,0)');
    x.fillStyle=g; x.fillRect(0,0,W,H);
    // partículas de niebla
    ps.forEach(p=>{ p.y+=p.vy*p.z*2.2; if(p.y<-5){p.y=H+5;p.x=Math.random()*W;}
      const a=0.08*p.z; x.beginPath(); x.arc(p.x,p.y,p.r*p.z*2.4,0,7);
      x.fillStyle='rgba(150,120,100,'+a+')'; x.fill(); });
    // ojos
    if(Math.random()<0.012 && eyes.length<5) spawnEye();
    for(let i=eyes.length-1;i>=0;i--){ const e=eyes[i]; e.life++;
      const k=e.life/e.max; const al=Math.sin(k*Math.PI); // aparece y se desvanece
      if(k>=1){eyes.splice(i,1);continue;}
      x.save(); x.globalAlpha=al*0.85;
      // dos ojos rojos
      [-1,1].forEach(s=>{ x.beginPath(); x.ellipse(e.x+s*e.size*1.6,e.y,e.size,e.size*0.55,0,0,7);
        const eg=x.createRadialGradient(e.x+s*e.size*1.6,e.y,0,e.x+s*e.size*1.6,e.y,e.size);
        eg.addColorStop(0,'#ff3b30'); eg.addColorStop(0.6,'#b3142e'); eg.addColorStop(1,'rgba(80,8,16,0)');
        x.fillStyle=eg; x.fill();
        x.beginPath(); x.arc(e.x+s*e.size*1.6,e.y,e.size*0.22,0,7); x.fillStyle='#1a0000'; x.fill(); });
      x.restore();
    }
    t++; requestAnimationFrame(draw);
  }
  draw();
})();

async function deriveKey(pass, salt){
  const enc=new TextEncoder();
  const base=await crypto.subtle.importKey('raw', enc.encode(pass), 'PBKDF2', false, ['deriveKey']);
  return crypto.subtle.deriveKey(
    { name:'PBKDF2', salt, iterations:150000, hash:'SHA-256' },
    base, { name:'AES-GCM', length:256 }, false, ['decrypt']);
}

    const p=JSON.parse(PAYLOAD);
    const key=await deriveKey(pw, b64ToBuf(p.salt));
    const dec=await crypto.subtle.decrypt({name:'AES-GCM', iv:b64ToBuf(p.iv)}, key, b64ToBuf(p.data));
    html=new TextDecoder().decode(dec);
  }catch(e){ html=null; }
  if(!html || html.indexOf('CodeBlocks')===-1){
    intentos++; shake(); showMsg(OMENS_FAIL[intentos % OMENS_FAIL.length]); document.getElementById('pw').value=''; return;
  }
  showMsg('La palabra es verdadera. El umbral se abre…', true);
  setTimeout(()=>{
    const frame=document.createElement('iframe');
    frame.setAttribute('sandbox','allow-scripts allow-same-origin allow-popups allow-downloads allow-modals allow-forms');
    frame.style.cssText='position:fixed;inset:0;width:100vw;height:100vh;border:0;z-index:9999;background:#070b18';
    frame.srcdoc=html;
    document.body.appendChild(frame);
    ['gate','bg'].forEach(id=>{const el=document.getElementById(id); if(el)el.style.display='none';});
    document.querySelectorAll('.veil,.vignette,.warn-foot').forEach(el=>el.style.display='none');
    document.body.style.overflow='hidden';
  }, 700);
}
document.getElementById('enterBtn').addEventListener('click', tryEnter);
document.getElementById('pw').addEventListener('keydown', e=>{ if(e.key==='Enter') tryEnter(); });
document.getElementById('pw').focus();

// ===== disuasiones (no infalibles en HTML estático, pero molestan al curioso) =====
document.addEventListener('keydown', e=>{
  if(e.key==='F12') e.preventDefault();
  if((e.ctrlKey||e.metaKey)&&e.shiftKey&&['I','J','C'].includes(e.key.toUpperCase())) e.preventDefault();
  if((e.ctrlKey||e.metaKey)&&['u','s'].includes(e.key.toLowerCase())) e.preventDefault();
});
document.addEventListener('dragstart',e=>e.preventDefault());
</script>
